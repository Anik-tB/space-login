<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Space Login</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  </head>
  <body>
    <div class="dreamcore-bg-light"></div>
    <div class="aurora"></div>
    <canvas id="portalCanvas"></canvas>
    <div class="centered-card">
      <h2 class="neon-flicker">Forgot Password</h2>
      <form id="resetForm">
        <label>Email:</label>
        <input type="email" id="resetEmail" required />
        <button type="submit">Send Reset Link</button>
      </form>
      <div id="resetMessage" style="margin-top: 10px"></div>
      <a class="back-link" href="index.html">Back to Login</a>
    </div>
    <div
      class="cyber-particle"
      style="
        top: 20%;
        left: 10%;
        width: 18px;
        height: 18px;
        animation-delay: 0s;
      "
    ></div>
    <div
      class="cyber-particle"
      style="
        top: 60%;
        left: 80%;
        width: 12px;
        height: 12px;
        animation-delay: 2s;
      "
    ></div>
    <div
      class="cyber-particle"
      style="
        top: 80%;
        left: 30%;
        width: 10px;
        height: 10px;
        animation-delay: 1s;
      "
    ></div>
    <script src="portal-effect.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: 'AIzaSyAjkHWsT9fxdbeQa-Udfu8KZxUjRA5EC4k',
        authDomain: 'space-21c7e.firebaseapp.com',
        projectId: 'space-21c7e',
        storageBucket: 'space-21c7e.firebasestorage.app',
        messagingSenderId: '980510379589',
        appId: '1:980510379589:web:a65a6ffd4a97b62282dd2c',
        measurementId: 'G-EPV8W821GK',
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      document
        .getElementById('resetForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();
          const email = document.getElementById('resetEmail').value;
          const messageDiv = document.getElementById('resetMessage');
          firebase
            .auth()
            .sendPasswordResetEmail(email)
            .then(function () {
              messageDiv.style.color = 'green';
              messageDiv.textContent =
                'Password reset email sent! Please check your inbox.';
            })
            .catch(function (error) {
              messageDiv.style.color = 'red';
              messageDiv.textContent = error.message;
            });
        });
    </script>
  </body>
</html>
