<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <canvas id="portalCanvas"></canvas>
    <div class="centered-card">
      <h2 class="neon-flicker">Reset Password</h2>
      <form action="reset_password.php" method="post">
        <input type="hidden" name="token" id="token" />
        <label>New Password:</label>
        <input type="password" name="password" required />
        <label>Confirm Password:</label>
        <input type="password" name="confirm_password" required />
        <button type="submit">Reset Password</button>
      </form>
      <a class="back-link" href="index.html">Back to Login</a>
    </div>
    <div class="cyber-particle" style="top: 10%; left: 30%; width: 16px; height: 16px; animation-delay: 1.2s;"></div>
    <div class="cyber-particle" style="top: 60%; left: 70%; width: 12px; height: 12px; animation-delay: 0.8s;"></div>
    <script>
      // Get token from URL and set it in the hidden field
      const params = new URLSearchParams(window.location.search);
      document.getElementById('token').value = params.get('token') || '';
    </script>
    <script src="portal-effect.js"></script>
  </body>
</html>
