<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <h2>Login</h2>
    <form action="login.php" method="post">
      Username: <input type="text" name="username" required /><br />
      Password: <input type="password" name="password" required /><br />
      <button type="submit">Login</button>
    </form>
    <div id="loginMessage" style="margin-top: 10px"></div>
    <div
      style="
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      "
    >
      <button
        id="googleLoginBtn"
        type="button"
        title="Login with Google"
        style="
          background: white;
          border: 1px solid #ccc;
          border-radius: 4px;
          padding: 6px 12px;
          display: flex;
          align-items: center;
          gap: 6px;
          cursor: pointer;
        "
      >
        <svg width="20" height="20" viewBox="0 0 48 48">
          <g>
            <path
              fill="#4285F4"
              d="M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.85-6.85C36.68 2.36 30.74 0 24 0 14.82 0 6.73 5.82 2.69 14.19l7.99 6.21C12.13 13.98 17.62 9.5 24 9.5z"
            />
            <path
              fill="#34A853"
              d="M46.1 24.55c0-1.64-.15-3.22-.42-4.74H24v9.01h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.6C43.98 37.13 46.1 31.3 46.1 24.55z"
            />
            <path
              fill="#FBBC05"
              d="M10.68 28.4c-1.13-3.36-1.13-6.97 0-10.33l-7.99-6.21C.64 16.09 0 19.01 0 22c0 2.99.64 5.91 1.8 8.14l7.99-6.21z"
            />
            <path
              fill="#EA4335"
              d="M24 44c6.74 0 12.68-2.23 16.98-6.09l-7.19-5.6c-2.01 1.35-4.59 2.14-7.79 2.14-6.38 0-11.87-4.48-13.32-10.5l-7.99 6.21C6.73 42.18 14.82 48 24 48z"
            />
          </g>
        </svg>
        <span>Google</span>
      </button>
      <button
        id="facebookLoginBtn"
        type="button"
        title="Login with Facebook"
        style="
          background: #1877f3;
          color: white;
          border: none;
          border-radius: 4px;
          padding: 6px 12px;
          display: flex;
          align-items: center;
          gap: 6px;
          cursor: pointer;
        "
      >
        <svg width="20" height="20" viewBox="0 0 32 32">
          <path
            fill="white"
            d="M29 0H3C1.3 0 0 1.3 0 3v26c0 1.7 1.3 3 3 3h13V20h-4v-5h4v-3.7C16 7.6 18.4 5.5 22.2 5.5c1.5 0 2.8.1 3.2.2v4h-2.2c-1.7 0-2 .8-2 2v2.3h4.2l-.6 5h-3.6V32h7c1.7 0 3-1.3 3-3V3c0-1.7-1.3-3-3-3z"
          />
        </svg>
        <span>Facebook</span>
      </button>
    </div>
    <a href="register.html">Don't have an account? Register</a>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: 'AIzaSyAjkHWsT9fxdbeQa-Udfu8KZxUjRA5EC4k',
        authDomain: 'space-21c7e.firebaseapp.com',
        projectId: 'space-21c7e',
        storageBucket: 'space-21c7e.firebasestorage.app',
        messagingSenderId: '980510379589',
        appId: '1:980510379589:web:a65a6ffd4a97b62282dd2c',
        measurementId: 'G-EPV8W821GK',
      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      // Google Login
      document
        .getElementById('googleLoginBtn')
        .addEventListener('click', function () {
          var provider = new firebase.auth.GoogleAuthProvider();
          firebase
            .auth()
            .signInWithPopup(provider)
            .then(function (result) {
              var user = result.user;
              // Sync with MySQL
              fetch('firebase_login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  email: user.email,
                  displayName: user.displayName || '',
                  uid: user.uid,
                  provider: user.providerData[0]?.providerId || 'google',
                }),
              })
                .then((res) => res.json())
                .then((data) => {
                  if (data.success) {
                    window.location.href = 'dashboard.php';
                  } else {
                    alert('MySQL sync failed: ' + data.message);
                  }
                });
            })
            .catch(function (error) {
              document.getElementById('loginMessage').style.color = 'red';
              document.getElementById('loginMessage').textContent =
                error.message;
            });
        });
      // Facebook Login
      document
        .getElementById('facebookLoginBtn')
        .addEventListener('click', function () {
          var provider = new firebase.auth.FacebookAuthProvider();
          firebase
            .auth()
            .signInWithPopup(provider)
            .then(function (result) {
              var user = result.user;
              // Sync with MySQL
              fetch('firebase_login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  email: user.email,
                  displayName: user.displayName || '',
                  uid: user.uid,
                  provider: user.providerData[0]?.providerId || 'facebook',
                }),
              })
                .then((res) => res.json())
                .then((data) => {
                  if (data.success) {
                    window.location.href = 'dashboard.php';
                  } else {
                    alert('MySQL sync failed: ' + data.message);
                  }
                });
            })
            .catch(function (error) {
              document.getElementById('loginMessage').style.color = 'red';
              document.getElementById('loginMessage').textContent =
                error.message;
            });
        });
    </script>
  </body>
</html>
